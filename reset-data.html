<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset de Dados - Cultura RPG</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #8b5cf6, #22c55e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 0.5rem;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        .success {
            background: #28a745;
        }
        .success:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Reset de Dados</h1>
        <p>Esta página permite resetar todos os dados do jogo.</p>
        
        <button onclick="resetLocalStorage()">
            🗑️ Limpar localStorage
        </button>
        
        <button onclick="resetSessionStorage()">
            🗑️ Limpar sessionStorage
        </button>
        
        <button onclick="resetCookies()">
            🍪 Limpar Cookies
        </button>
        
        <button onclick="resetAll()">
            💥 RESETAR TUDO
        </button>
        
        <br><br>
        
        <button class="success" onclick="goToIndex()">
            🏠 Voltar ao Login
        </button>
        
        <div id="status" style="margin-top: 1rem; font-weight: bold;"></div>
    </div>

    <script>
        function showStatus(message, isSuccess = true) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = isSuccess ? '#28a745' : '#dc3545';
        }

        function resetLocalStorage() {
            localStorage.clear();
            showStatus('✅ localStorage limpo!');
        }

        function resetSessionStorage() {
            sessionStorage.clear();
            showStatus('✅ sessionStorage limpo!');
        }

        function resetCookies() {
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            showStatus('✅ Cookies limpos!');
        }

        function resetAll() {
            if (confirm('⚠️ ATENÇÃO: Isso vai apagar TODOS os dados salvos!\n\nTem certeza que deseja continuar?')) {
                localStorage.clear();
                sessionStorage.clear();
                
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                
                showStatus('💥 TODOS os dados foram resetados!');
                
                setTimeout(() => {
                    alert('Reset completo! Redirecionando para o login...');
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        function goToIndex() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
