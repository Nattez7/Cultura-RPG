<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cultural RPG</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Container do login -->
    <div class="container">
        <!-- Formulário de Login -->
        <form id="login-form" class="form active">
            <div class="form-header">
                <div class="logo">
                    <i class="fas fa-dragon"></i>
                </div>
                <h1>Portal Cultural</h1>
                <p class="subtitle">Embarque nesta jornada única</p>
            </div>

            <div class="social-login">
                <button type="button" class="social-button google">
                    <i class="fab fa-google"></i>
                    <span>Google
                </button>
                <button type="button" class="social-button facebook">
                    <i class="fab fa-facebook"></i>
                    <span>Facebook
                </button>
            </div>

            <div class="divider">
                <span>ou
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder=" " required>
                    <label>E-mail</label>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder=" " required>
                    <label>Senha</label>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <span>Lembrar-me
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="submit-btn">
                <span>Entrar
                <i class="fas fa-arrow-right"></i>
            </button>

            <div class="switch-form">
                <p>Ainda não é um viajante?</p>
                <button type="button" onclick="toggleForm()">Criar nova conta</button>
                <p style="margin-top: 1rem;">
                    <a href="tutorial.html" style="color: white; text-decoration: none;">
                        <i class="fas fa-question-circle"></i> Como funciona?
                    </a>
                </p>
                <p style="margin-top: 1rem;">
                    <button type="button" onclick="resetAllData()" style="background: #dc3545; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem;">
                        <i class="fas fa-trash"></i> Reset Dados
                    </button>
                </p>
            </div>
        </form>

        <!-- Formulário de Registro -->
<form id="register-form" class="form">
    <div class="form-header">
        <div class="logo">
            <i class="fas fa-scroll"></i>
        </div>
        <h1>Criar Conta</h1>
        <p class="subtitle">Comece sua aventura</p>
    </div>

    <!-- Nome Completo -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="register-fullname" placeholder=" " required>
            <label>Nome Completo</label>
        </div>
    </div>

    <!-- Nome de Usuário -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-at"></i>
            <input type="text" id="register-username" placeholder=" " required>
            <label>Nome de Usuário</label>
        </div>
    </div>

    <!-- Email -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="register-email" placeholder=" " required>
            <label>E-mail</label>
        </div>
    </div>

    <!-- Data de Nascimento -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-calendar"></i>
            <input type="date" id="register-birthdate" required>
            <label class="date-label">Data de Nascimento</label>
        </div>
    </div>

        <!-- Idade (calculada automaticamente) -->
        <div class="form-group">
            <div class="input-icon">
                <i class="fas fa-birthday-cake"></i>
                <input type="number" id="register-age" readonly value="">
                <label class="static-label">Idade</label>
            </div>
        </div>


    <!-- Telefone -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-phone"></i>
            <input type="tel" id="register-phone" placeholder=" " required>
            <label>Telefone</label>
        </div>
    </div>

    <!-- Senha -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="register-password" placeholder=" " required>
            <label>Senha</label>
        </div>
    </div>

    <!-- Confirmar Senha -->
    <div class="form-group">
        <div class="input-icon">
            <i class="fas fa-shield-alt"></i>
            <input type="password" id="register-confirm-password" placeholder=" " required>
            <label>Confirmar Senha</label>
        </div>
    </div>

    <button type="submit" class="submit-btn">
        <span>Criar Conta
        <i class="fas fa-arrow-right"></i>
    </button>

    <div class="switch-form">
        <p>Já é um viajante?</p>
        <button type="button" onclick="toggleForm()">Fazer login</button>
    </div>
</form>


        <!-- Loading Spinner (inicialmente oculto) -->
        <div id="loading" class="loading-spinner" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
    </div>

    <!-- Firebase App (obrigatório) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Seus scripts -->
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
