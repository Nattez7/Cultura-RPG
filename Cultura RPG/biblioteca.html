<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Portal Cultural RPG</title>
    <link rel="stylesheet" href="assets/css/biblioteca.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-dragon"></i>
                <span>Portal Cultural</span>
            </div>
            <nav class="nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-scroll"></i>
                    <span>Missões Diárias</span>
                </a>
                <a href="loja.html" class="nav-link">
                    <i class="fas fa-store"></i>
                    <span>Loja</span>
                </a>
                <a href="biblioteca.html" class="nav-link active">
                    <i class="fas fa-book"></i>
                    <span>Biblioteca</span>
                </a>
                <a href="rpg.html" class="nav-link">
                    <i class="fas fa-dice-d20"></i>
                    <span>RPG</span>
                </a>
                <a href="#" onclick="showRPGProfile(); return false;" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Perfil RPG</span>
                </a>
                <a href="tutorial.html" class="nav-link tutorial-link">
                    <i class="fas fa-question-circle"></i>
                    <span>Como Funciona</span>
                </a>
            </nav>
            <div class="user-menu">
                <div class="theme-toggle" onclick="toggleDarkMode()">
                    <i class="fas fa-moon"></i>
                </div>
                <div class="user-avatar" onclick="showUserMenu()">
                    <i class="fas fa-user"></i>
                </div>
                <div id="user-menu" class="user-dropdown" style="display: none;">
                    <div class="user-info">
                        <span id="user-email">Carregando...</span>
                    </div>
                    <button onclick="showRPGProfile()"><i class="fas fa-user-circle"></i> Perfil RPG</button>
                    <button onclick="window.location.href='profile.html'"><i class="fas fa-cog"></i> Configurações</button>
                    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Library Section -->
        <section class="section">
            <h2>Minha Biblioteca</h2>
            <div class="library-info">
                <p><i class="fas fa-info-circle"></i> Aqui estão os conhecimentos que você já adquiriu na loja</p>
            </div>
            <div class="owned-knowledge" id="owned-knowledge">
                <div class="empty-library" id="empty-library">
                    <i class="fas fa-shopping-cart"></i>
                    <p>Compre conhecimentos na <a href="loja.html">Loja</a> para começar sua biblioteca!</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/knowledge-loader.js"></script>
    <script src="assets/js/data-manager.js"></script>
    
    <script src="assets/js/rpg-system.js"></script>
    <script src="assets/js/rpg-profile.js"></script>
    <script src="assets/js/simple-library.js"></script>
    
    <script>
    // User menu functions
    function showUserMenu() {
        const menu = document.getElementById('user-menu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
    
    async function logout() {
        if (confirm('Deseja realmente sair?')) {
            await authManager.logout();
        }
    }
    
    // Update user info when auth state changes
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('user-email').textContent = user.email;
        }
    });
    
    // Close user menu when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.user-avatar') && !e.target.closest('#user-menu')) {
            document.getElementById('user-menu').style.display = 'none';
        }
    });
    </script>
</body>
</html>
