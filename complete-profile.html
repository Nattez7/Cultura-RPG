<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Perfil - Portal Cultural RPG</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <form id="complete-profile-form" class="form active">
            <div class="form-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Complete seu Perfil</h1>
                <p class="subtitle">Finalize seu cadastro para começar a aventura</p>
            </div>

            <!-- Nome Completo -->
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullname" placeholder=" " required>
                    <label>Nome Completo</label>
                </div>
            </div>

            <!-- Nome de Usuário -->
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-at"></i>
                    <input type="text" id="username" placeholder=" " required>
                    <label>Nome de Usuário</label>
                </div>
            </div>

            <!-- Data de Nascimento -->
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-calendar"></i>
                    <input type="date" id="birthdate" required>
                    <label class="date-label">Data de Nascimento</label>
                </div>
            </div>

            <!-- Idade (calculada automaticamente) -->
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-birthday-cake"></i>
                    <input type="number" id="age" readonly value="">
                    <label class="static-label">Idade</label>
                </div>
            </div>

            <!-- Telefone -->
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" placeholder=" " required>
                    <label>Telefone</label>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Continuar
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Loading Spinner -->
        <div id="loading" class="loading-spinner" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
        // Calcular idade automaticamente
        document.getElementById('birthdate').addEventListener('change', function() {
            const birthdate = new Date(this.value);
            const today = new Date();
            let age = today.getFullYear() - birthdate.getFullYear();
            const monthDiff = today.getMonth() - birthdate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthdate.getDate())) {
                age--;
            }
            
            document.getElementById('age').value = age;
        });

        // Verificar se há usuário pendente
        const pendingUser = JSON.parse(sessionStorage.getItem('pendingUser') || 'null');
        if (!pendingUser) {
            window.location.href = 'index.html';
        }

        // Preencher nome se disponível
        if (pendingUser && pendingUser.displayName) {
            document.getElementById('fullname').value = pendingUser.displayName;
        }

        // Submit do formulário
        document.getElementById('complete-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const profileData = {
                    fullName: document.getElementById('fullname').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    birthdate: document.getElementById('birthdate').value,
                    age: parseInt(document.getElementById('age').value),
                    phone: document.getElementById('phone').value.trim()
                };

                // Atualizar dados no Firestore
                await db.collection('users').doc(pendingUser.uid).update({
                    'profile.fullName': profileData.fullName,
                    'profile.username': profileData.username,
                    'profile.age': profileData.age,
                    'profile.phone': profileData.phone,
                    'profile.birthdate': profileData.birthdate,
                    'profile.profileComplete': true,
                    'displayName': profileData.fullName,
                    'lastUpdated': firebase.firestore.FieldValue.serverTimestamp()
                });

                // Limpar dados pendentes
                sessionStorage.removeItem('pendingUser');
                
                // Redirecionar para criação de personagem
                window.location.href = 'create-character.html';
                
            } catch (error) {
                console.error('Erro ao completar perfil:', error);
                alert('Erro ao salvar dados. Tente novamente.');
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
